<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title>CROSSEC - Microsoft Cloud Security Crossword</title>

    <!-- Primary meta -->
    <meta name="description" content="A browser crossword game about Microsoft Cloud security. Free, static, no sign-in required." />

    <!--
      Open Graph and Twitter card meta tags - static baseline defaults.
      og:image points to a bundled default preview generated at build time.
      NOTE: Per-result dynamic OG images (showing the player's actual badge)
      are a SEPARATE later task that will be served from the Cloudflare Worker
      route. The Worker stub in worker/ remains unchanged. These static defaults
      are the baseline that unfurls when someone pastes the game URL.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CROSSEC - Microsoft Cloud Security Crossword" />
    <meta property="og:description" content="Test your Microsoft Cloud security knowledge. Random puzzle every session. Four difficulty levels. Free, no sign-in." />
    <meta property="og:image" content="/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CROSSEC - Microsoft Cloud Security Crossword" />
    <meta name="twitter:description" content="Test your Microsoft Cloud security knowledge. Random puzzle every session. Four difficulty levels. Free, no sign-in." />
    <meta name="twitter:image" content="/og-default.png" />

    <link rel="stylesheet" href="/src/styles/app.css" />
    <!-- Umami analytics: privacy-friendly, self-hosted. No cookies, GDPR-compliant. -->
    <script defer src="https://analytics.aboutcloud.io/script.js" data-website-id="10bd8a22-2a94-45e5-8971-090618ca4d7d"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
