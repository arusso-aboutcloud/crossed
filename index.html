<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crossed - Microsoft Cloud Security Crossword</title>

    <!-- Primary meta -->
    <meta name="description" content="A browser crossword game about Microsoft Cloud security. Free, static, no sign-in required." />

    <!--
      Open Graph and Twitter card meta tags.
      The static badge path below is a placeholder.
      When the OG-image Worker is implemented it will override these
      per-game via a dynamic URL served from the Worker route.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Crossed - Microsoft Cloud Security Crossword" />
    <meta property="og:description" content="Test your Microsoft Cloud security knowledge. New puzzle every load. Four difficulty levels." />
    <meta property="og:image" content="/badge-placeholder.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crossed - Microsoft Cloud Security Crossword" />
    <meta name="twitter:description" content="Test your Microsoft Cloud security knowledge. New puzzle every load. Four difficulty levels." />
    <meta name="twitter:image" content="/badge-placeholder.png" />

    <link rel="stylesheet" href="/src/styles/app.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
