<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" role="img" aria-label="Hard badge">
  <defs>
    <linearGradient id="border-hard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
    <clipPath id="shield-clip-hard">
      <path d="M100,8 L185,40 L185,120 Q185,185 100,220 Q15,185 15,120 L15,40 Z"/>
    </clipPath>
    <filter id="shadow-hard" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#a855f7" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Shield outer border -->
  <path d="M100,8 L185,40 L185,120 Q185,185 100,220 Q15,185 15,120 L15,40 Z"
        fill="url(#border-hard)" filter="url(#shadow-hard)"/>

  <!-- Shield inner dark body -->
  <path d="M100,16 L178,45 L178,120 Q178,178 100,212 Q22,178 22,120 L22,45 Z"
        fill="#0d1117"/>

  <!-- Microsoft 4-color logo -->
  <rect x="80" y="25" width="18" height="18" fill="#f25022" rx="1"/>
  <rect x="101" y="25" width="18" height="18" fill="#7fba00" rx="1"/>
  <rect x="80" y="46" width="18" height="18" fill="#00a4ef" rx="1"/>
  <rect x="101" y="46" width="18" height="18" fill="#ffb900" rx="1"/>

  <!-- Ribbon banner -->
  <polygon points="15,90 185,90 185,118 15,118" fill="#ffffff"/>
  <polygon points="15,90 30,104 15,118" fill="#d1d5db"/>
  <polygon points="185,90 170,104 185,118" fill="#d1d5db"/>
  <text x="100" y="101" font-family="Arial Black, Arial, sans-serif" font-size="8" font-weight="900" fill="#1a1a2e" text-anchor="middle" letter-spacing="1">SUMMER SECURITY</text>
  <text x="100" y="112" font-family="Arial Black, Arial, sans-serif" font-size="8" font-weight="900" fill="#1a1a2e" text-anchor="middle" letter-spacing="1">CROSSWORD</text>

  <!-- Padlock icon (Hard) -->
  <rect x="86" y="148" width="28" height="22" rx="3" fill="none" stroke="#a855f7" stroke-width="2.5"/>
  <path d="M91,148 L91,142 Q91,134 100,134 Q109,134 109,142 L109,148" fill="none" stroke="#a855f7" stroke-width="2.5"/>
  <circle cx="100" cy="159" r="3" fill="#a855f7"/>
  <line x1="100" y1="162" x2="100" y2="166" stroke="#a855f7" stroke-width="2"/>

  <!-- Star rating pill: 3 stars -->
  <rect x="65" y="190" width="70" height="20" rx="10" fill="#0d1117" stroke="#a855f7" stroke-width="1.5"/>
  <!-- Star 1 at cx=86, cy=200, r=7 -->
  <path d="M86,193 L88.45,199.16 L95.65,199.16 L90.06,203.24 L92.06,209.5 L86,205.5 L79.94,209.5 L81.94,203.24 L76.35,199.16 L83.55,199.16 Z" fill="white"/>
  <!-- Star 2 at cx=100, cy=200, r=7 -->
  <path d="M100,193 L102.45,199.16 L109.65,199.16 L104.06,203.24 L106.06,209.5 L100,205.5 L93.94,209.5 L95.94,203.24 L90.35,199.16 L97.55,199.16 Z" fill="white"/>
  <!-- Star 3 at cx=114, cy=200, r=7 -->
  <path d="M114,193 L116.45,199.16 L123.65,199.16 L118.06,203.24 L120.06,209.5 L114,205.5 L107.94,209.5 L109.94,203.24 L104.35,199.16 L111.55,199.16 Z" fill="white"/>

  <!-- Tier label with horizontal lines -->
  <line x1="15" y1="230" x2="75" y2="230" stroke="#a855f7" stroke-width="1.5"/>
  <text x="100" y="234" font-family="Arial Black, Arial, sans-serif" font-size="11" font-weight="900" fill="#a855f7" text-anchor="middle" letter-spacing="2">HARD</text>
  <line x1="125" y1="230" x2="185" y2="230" stroke="#a855f7" stroke-width="1.5"/>
</svg>
