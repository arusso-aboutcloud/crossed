<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 290" width="220" height="290" role="img" aria-label="Hard badge">
  <defs>
    <linearGradient id="outer-hard" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
    <linearGradient id="inner-hard" x1="0.2" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2040"/>
      <stop offset="100%" stop-color="#0b0d1a"/>
    </linearGradient>
    <linearGradient id="ribbon-hard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <filter id="shadow-hard">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#581c87" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- OUTER SHIELD (metallic border) -->
  <path d="M110,6 L204,42 L204,130 Q204,200 110,238 Q16,200 16,130 L16,42 Z"
        fill="url(#outer-hard)" filter="url(#shadow-hard)"/>

  <!-- INNER SHIELD (dark body) -->
  <path d="M110,18 L192,50 L192,130 Q192,192 110,224 Q28,192 28,130 L28,50 Z"
        fill="url(#inner-hard)"/>

  <!-- Highlight edges for 3D effect -->
  <path d="M110,18 L192,50" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
  <path d="M110,18 L28,50" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>

  <!-- MS LOGO: 2x2 colored squares -->
  <rect x="89" y="30" width="19" height="19" fill="#f25022" rx="2"/>
  <rect x="112" y="30" width="19" height="19" fill="#7fba00" rx="2"/>
  <rect x="89" y="53" width="19" height="19" fill="#00a4ef" rx="2"/>
  <rect x="112" y="53" width="19" height="19" fill="#ffb900" rx="2"/>

  <!-- RIBBON BANNER -->
  <polygon points="16,96 204,96 204,126 16,126" fill="url(#ribbon-hard)"/>
  <polygon points="16,96 34,111 16,126" fill="#bbbbbb"/>
  <polygon points="204,96 186,111 204,126" fill="#bbbbbb"/>
  <line x1="16" y1="96" x2="204" y2="96" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
  <text x="110" y="109" font-family="Arial Black, Arial, sans-serif" font-size="9.5" font-weight="900"
        fill="#0a0a1a" text-anchor="middle" letter-spacing="1.5">SUMMER SECURITY</text>
  <text x="110" y="121" font-family="Arial Black, Arial, sans-serif" font-size="9.5" font-weight="900"
        fill="#0a0a1a" text-anchor="middle" letter-spacing="1.5">CROSSWORD</text>

  <!-- ICON: Padlock (Hard) -->
  <rect x="94" y="158" width="32" height="26" rx="4" fill="none" stroke="#a855f7" stroke-width="3"/>
  <path d="M99,158 L99,150 Q99,140 110,140 Q121,140 121,150 L121,158"
        fill="none" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
  <circle cx="110" cy="171" r="4" fill="#a855f7"/>
  <line x1="110" y1="175" x2="110" y2="180" stroke="#a855f7" stroke-width="2.5"/>

  <!-- STAR PILL -->
  <rect x="72" y="203" width="76" height="22" rx="11" fill="#0b0d1a" stroke="#a855f7" stroke-width="2"/>
  <!-- 3 stars at cx=88, cx=110, cx=132, cy=214 -->
  <polygon points="88,207 90.0,212.2 95.6,212.8 91.3,216.1 92.7,221.7 88,218.0 83.3,221.7 84.7,216.1 80.4,212.8 86.0,212.2" fill="white"/>
  <polygon points="110,207 112.0,212.2 117.6,212.8 113.3,216.1 114.7,221.7 110,218.0 105.3,221.7 106.7,216.1 102.4,212.8 108.0,212.2" fill="white"/>
  <polygon points="132,207 134.0,212.2 139.6,212.8 135.3,216.1 136.7,221.7 132,218.0 127.3,221.7 128.7,216.1 124.4,212.8 130.0,212.2" fill="white"/>

  <!-- TIER LABEL SECTION -->
  <line x1="16" y1="248" x2="78" y2="248" stroke="#a855f7" stroke-width="2"/>
  <text x="110" y="252" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900"
        fill="#a855f7" text-anchor="middle" letter-spacing="3">HARD</text>
  <line x1="142" y1="248" x2="204" y2="248" stroke="#a855f7" stroke-width="2"/>

  <text x="110" y="268" font-family="Arial, sans-serif" font-size="9" font-weight="700"
        fill="#ffffff" text-anchor="middle">Impressive!</text>

  <text x="110" y="282" font-family="Arial, sans-serif" font-size="7.5" fill="#aaaaaa" text-anchor="middle">You mastered complex concepts</text>
</svg>
