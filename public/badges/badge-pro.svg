<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" role="img" aria-label="Expert badge">
  <defs>
    <linearGradient id="border-pro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <clipPath id="shield-clip-pro">
      <path d="M100,8 L185,40 L185,120 Q185,185 100,220 Q15,185 15,120 L15,40 Z"/>
    </clipPath>
    <filter id="shadow-pro" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f59e0b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Shield outer border -->
  <path d="M100,8 L185,40 L185,120 Q185,185 100,220 Q15,185 15,120 L15,40 Z"
        fill="url(#border-pro)" filter="url(#shadow-pro)"/>

  <!-- Shield inner dark body -->
  <path d="M100,16 L178,45 L178,120 Q178,178 100,212 Q22,178 22,120 L22,45 Z"
        fill="#0d1117"/>

  <!-- Microsoft 4-color logo -->
  <rect x="80" y="25" width="18" height="18" fill="#f25022" rx="1"/>
  <rect x="101" y="25" width="18" height="18" fill="#7fba00" rx="1"/>
  <rect x="80" y="46" width="18" height="18" fill="#00a4ef" rx="1"/>
  <rect x="101" y="46" width="18" height="18" fill="#ffb900" rx="1"/>

  <!-- Ribbon banner -->
  <polygon points="15,90 185,90 185,118 15,118" fill="#ffffff"/>
  <polygon points="15,90 30,104 15,118" fill="#d1d5db"/>
  <polygon points="185,90 170,104 185,118" fill="#d1d5db"/>
  <text x="100" y="101" font-family="Arial Black, Arial, sans-serif" font-size="8" font-weight="900" fill="#1a1a2e" text-anchor="middle" letter-spacing="1">SUMMER SECURITY</text>
  <text x="100" y="112" font-family="Arial Black, Arial, sans-serif" font-size="8" font-weight="900" fill="#1a1a2e" text-anchor="middle" letter-spacing="1">CROSSWORD</text>

  <!-- Trophy icon (Expert) -->
  <path d="M86,132 L114,132 L114,152 Q114,165 100,168 Q86,165 86,152 Z" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <path d="M86,138 Q76,138 76,148 Q76,156 86,158" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <path d="M114,138 Q124,138 124,148 Q124,156 114,158" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <rect x="95" y="168" width="10" height="8" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <line x1="87" y1="178" x2="113" y2="178" stroke="#f59e0b" stroke-width="2.5"/>

  <!-- Star rating pill: 4 stars -->
  <rect x="65" y="190" width="70" height="20" rx="10" fill="#0d1117" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Star 1 at cx=82, cy=200, r=7 -->
  <path d="M82,193 L84.45,199.16 L91.65,199.16 L86.06,203.24 L88.06,209.5 L82,205.5 L75.94,209.5 L77.94,203.24 L72.35,199.16 L79.55,199.16 Z" fill="white"/>
  <!-- Star 2 at cx=94, cy=200, r=7 -->
  <path d="M94,193 L96.45,199.16 L103.65,199.16 L98.06,203.24 L100.06,209.5 L94,205.5 L87.94,209.5 L89.94,203.24 L84.35,199.16 L91.55,199.16 Z" fill="white"/>
  <!-- Star 3 at cx=106, cy=200, r=7 -->
  <path d="M106,193 L108.45,199.16 L115.65,199.16 L110.06,203.24 L112.06,209.5 L106,205.5 L99.94,209.5 L101.94,203.24 L96.35,199.16 L103.55,199.16 Z" fill="white"/>
  <!-- Star 4 at cx=118, cy=200, r=7 -->
  <path d="M118,193 L120.45,199.16 L127.65,199.16 L122.06,203.24 L124.06,209.5 L118,205.5 L111.94,209.5 L113.94,203.24 L108.35,199.16 L115.55,199.16 Z" fill="white"/>

  <!-- Tier label with horizontal lines -->
  <line x1="15" y1="230" x2="65" y2="230" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="100" y="234" font-family="Arial Black, Arial, sans-serif" font-size="11" font-weight="900" fill="#f59e0b" text-anchor="middle" letter-spacing="2">EXPERT</text>
  <line x1="135" y1="230" x2="185" y2="230" stroke="#f59e0b" stroke-width="1.5"/>
</svg>
