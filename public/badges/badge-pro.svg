<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 290" width="220" height="290" role="img" aria-label="Expert badge">
  <defs>
    <!-- Outer shield: 4-stop metallic gold - near-white -> bright gold -> deep amber -> shadow -->
    <linearGradient id="outer-pro" x1="0.25" y1="0" x2="0.1" y2="1">
      <stop offset="0%"   stop-color="#fffbe0"/>
      <stop offset="22%"  stop-color="#fbbf24"/>
      <stop offset="62%"  stop-color="#b45309"/>
      <stop offset="100%" stop-color="#2e1000"/>
    </linearGradient>
    <!-- Inner shield: dark polished steel with warm gold-amber tint -->
    <linearGradient id="inner-pro" x1="0.3" y1="0" x2="0.1" y2="1">
      <stop offset="0%"   stop-color="#221a04"/>
      <stop offset="50%"  stop-color="#150f00"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </linearGradient>
    <!-- Metallic sheen: stronger for gold (gold polish reflects more light) -->
    <linearGradient id="sheen-pro" x1="0.35" y1="0" x2="0.15" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.48"/>
      <stop offset="38%"  stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Accent glow from base (warm gold bounce) -->
    <linearGradient id="inner-glow-pro" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#f59e0b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribbon-pro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f4f4f4"/>
      <stop offset="45%"  stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#c4c4c4"/>
    </linearGradient>
    <filter id="shadow-pro" x="-22%" y="-12%" width="144%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#fbbf24" flood-opacity="0.70"/>
    </filter>
  </defs>

  <!-- OUTER SHIELD -->
  <path d="M110,6 L204,42 L204,130 Q204,200 110,238 Q16,200 16,130 L16,42 Z"
        fill="url(#outer-pro)" filter="url(#shadow-pro)"/>

  <!-- Crown highlight: stronger for gold (it's the top tier) -->
  <path d="M110,6 L204,42 L194,48 L110,14 L26,48 L16,42 Z"
        fill="rgba(255,255,255,0.35)"/>

  <!-- Inner rim -->
  <path d="M110,10 L201,44 L201,130 Q201,198 110,234 Q19,198 19,130 L19,44 Z"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- INNER SHIELD -->
  <path d="M110,18 L192,50 L192,130 Q192,192 110,224 Q28,192 28,130 L28,50 Z"
        fill="url(#inner-pro)"/>
  <path d="M110,18 L192,50 L192,130 Q192,192 110,224 Q28,192 28,130 L28,50 Z"
        fill="url(#inner-glow-pro)"/>
  <path d="M110,18 L192,50 L192,130 Q192,192 110,224 Q28,192 28,130 L28,50 Z"
        fill="url(#sheen-pro)"/>

  <!-- Edge highlights -->
  <path d="M110,18 L192,50" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" fill="none"/>
  <path d="M110,18 L28,50"  stroke="rgba(255,255,255,0.30)" stroke-width="2"   fill="none"/>

  <!-- MS LOGO -->
  <rect x="89" y="30" width="19" height="19" fill="#f25022" rx="2"/>
  <rect x="112" y="30" width="19" height="19" fill="#7fba00" rx="2"/>
  <rect x="89" y="53" width="19" height="19" fill="#00a4ef" rx="2"/>
  <rect x="112" y="53" width="19" height="19" fill="#ffb900" rx="2"/>

  <!-- RIBBON BANNER -->
  <polygon points="16,96 204,96 204,126 16,126" fill="url(#ribbon-pro)"/>
  <polygon points="16,96 34,111 16,126" fill="#bbbbbb"/>
  <polygon points="204,96 186,111 204,126" fill="#bbbbbb"/>
  <line x1="16" y1="96" x2="204" y2="96" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
  <text x="110" y="109" font-family="Arial Black, Arial, sans-serif" font-size="9.5" font-weight="900"
        fill="#0a0a1a" text-anchor="middle" letter-spacing="1.5">SUMMER SECURITY</text>
  <text x="110" y="121" font-family="Arial Black, Arial, sans-serif" font-size="9.5" font-weight="900"
        fill="#0a0a1a" text-anchor="middle" letter-spacing="1.5">CROSSWORD</text>

  <!-- ICON: Trophy (Expert) -->
  <path d="M93,140 L127,140 L127,162 Q127,178 110,184 Q93,178 93,162 Z"
        fill="none" stroke="#fbbf24" stroke-width="3"/>
  <path d="M93,147 Q80,147 80,159 Q80,169 93,172" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <path d="M127,147 Q140,147 140,159 Q140,169 127,172" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <rect x="105" y="184" width="10" height="10" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <line x1="92" y1="196" x2="128" y2="196" stroke="#fbbf24" stroke-width="3"/>
  <path d="M88,172 Q82,168 84,161 Q88,165 88,172" fill="#fbbf24" opacity="0.7"/>
  <path d="M132,172 Q138,168 136,161 Q132,165 132,172" fill="#fbbf24" opacity="0.7"/>

  <!-- STAR PILL -->
  <rect x="72" y="203" width="76" height="22" rx="11" fill="#0b0d1a" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="82,207 84.0,212.2 89.6,212.8 85.3,216.1 86.7,221.7 82,218.0 77.3,221.7 78.7,216.1 74.4,212.8 80.0,212.2" fill="white"/>
  <polygon points="100,207 102.0,212.2 107.6,212.8 103.3,216.1 104.7,221.7 100,218.0 95.3,221.7 96.7,216.1 92.4,212.8 98.0,212.2" fill="white"/>
  <polygon points="120,207 122.0,212.2 127.6,212.8 123.3,216.1 124.7,221.7 120,218.0 115.3,221.7 116.7,216.1 112.4,212.8 118.0,212.2" fill="white"/>
  <polygon points="138,207 140.0,212.2 145.6,212.8 141.3,216.1 142.7,221.7 138,218.0 133.3,221.7 134.7,216.1 130.4,212.8 136.0,212.2" fill="white"/>

  <!-- TIER LABEL -->
  <line x1="16" y1="248" x2="68" y2="248" stroke="#fbbf24" stroke-width="2"/>
  <text x="110" y="252" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900"
        fill="#fbbf24" text-anchor="middle" letter-spacing="3">EXPERT</text>
  <line x1="152" y1="248" x2="204" y2="248" stroke="#fbbf24" stroke-width="2"/>

  <text x="110" y="268" font-family="Arial, sans-serif" font-size="9" font-weight="700"
        fill="#ffffff" text-anchor="middle">Legendary!</text>
  <text x="110" y="282" font-family="Arial, sans-serif" font-size="7.5" fill="#aaaaaa" text-anchor="middle">True security champion</text>
</svg>
