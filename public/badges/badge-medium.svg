<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 290" width="220" height="290" role="img" aria-label="Medium badge">
  <defs>
    <!-- Outer shield: 4-stop metallic blue -->
    <linearGradient id="outer-medium" x1="0.25" y1="0" x2="0.1" y2="1">
      <stop offset="0%"   stop-color="#dbeeff"/>
      <stop offset="22%"  stop-color="#60a5fa"/>
      <stop offset="62%"  stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#071030"/>
    </linearGradient>
    <!-- Inner shield: dark polished steel with cool blue tint -->
    <linearGradient id="inner-medium" x1="0.3" y1="0" x2="0.1" y2="1">
      <stop offset="0%"   stop-color="#1c2840"/>
      <stop offset="50%"  stop-color="#10182c"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <!-- Metallic sheen -->
    <linearGradient id="sheen-medium" x1="0.35" y1="0" x2="0.15" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.40"/>
      <stop offset="38%"  stop-color="white" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Accent glow from base -->
    <linearGradient id="inner-glow-medium" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#3b82f6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribbon-medium" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f4f4f4"/>
      <stop offset="45%"  stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#c4c4c4"/>
    </linearGradient>
    <filter id="shadow-medium" x="-22%" y="-12%" width="144%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#3b82f6" flood-opacity="0.70"/>
    </filter>
  </defs>

  <!-- OUTER SHIELD -->
  <path d="M110,6 L204,42 L204,130 Q204,200 110,238 Q16,200 16,130 L16,42 Z"
        fill="url(#outer-medium)" filter="url(#shadow-medium)"/>

  <!-- Crown highlight -->
  <path d="M110,6 L204,42 L194,48 L110,14 L26,48 L16,42 Z"
        fill="rgba(255,255,255,0.28)"/>

  <!-- Inner rim -->
  <path d="M110,10 L201,44 L201,130 Q201,198 110,234 Q19,198 19,130 L19,44 Z"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>

  <!-- INNER SHIELD -->
  <path d="M110,18 L192,50 L192,130 Q192,192 110,224 Q28,192 28,130 L28,50 Z"
        fill="url(#inner-medium)"/>
  <path d="M110,18 L192,50 L192,130 Q192,192 110,224 Q28,192 28,130 L28,50 Z"
        fill="url(#inner-glow-medium)"/>
  <path d="M110,18 L192,50 L192,130 Q192,192 110,224 Q28,192 28,130 L28,50 Z"
        fill="url(#sheen-medium)"/>

  <!-- Edge highlights -->
  <path d="M110,18 L192,50" stroke="rgba(255,255,255,0.52)" stroke-width="2.5" fill="none"/>
  <path d="M110,18 L28,50"  stroke="rgba(255,255,255,0.28)" stroke-width="2"   fill="none"/>

  <!-- MS LOGO -->
  <rect x="89" y="30" width="19" height="19" fill="#f25022" rx="2"/>
  <rect x="112" y="30" width="19" height="19" fill="#7fba00" rx="2"/>
  <rect x="89" y="53" width="19" height="19" fill="#00a4ef" rx="2"/>
  <rect x="112" y="53" width="19" height="19" fill="#ffb900" rx="2"/>

  <!-- RIBBON BANNER -->
  <polygon points="16,96 204,96 204,126 16,126" fill="url(#ribbon-medium)"/>
  <polygon points="16,96 34,111 16,126" fill="#bbbbbb"/>
  <polygon points="204,96 186,111 204,126" fill="#bbbbbb"/>
  <line x1="16" y1="96" x2="204" y2="96" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
  <text x="110" y="109" font-family="Arial Black, Arial, sans-serif" font-size="9.5" font-weight="900"
        fill="#0a0a1a" text-anchor="middle" letter-spacing="1.5">SUMMER SECURITY</text>
  <text x="110" y="121" font-family="Arial Black, Arial, sans-serif" font-size="9.5" font-weight="900"
        fill="#0a0a1a" text-anchor="middle" letter-spacing="1.5">CROSSWORD</text>

  <!-- ICON: Shield with check (Medium) -->
  <path d="M110,140 L130,149 L130,166 Q130,180 110,187 Q90,180 90,166 L90,149 Z"
        fill="none" stroke="#60a5fa" stroke-width="3"/>
  <polyline points="99,165 106,173 123,154" fill="none" stroke="#60a5fa" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- STAR PILL -->
  <rect x="72" y="203" width="76" height="22" rx="11" fill="#0b0d1a" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="99,207 101.0,212.2 106.6,212.8 102.3,216.1 103.7,221.7 99,218.0 94.3,221.7 95.7,216.1 91.4,212.8 97.0,212.2" fill="white"/>
  <polygon points="121,207 123.0,212.2 128.6,212.8 124.3,216.1 125.7,221.7 121,218.0 116.3,221.7 117.7,216.1 113.4,212.8 119.0,212.2" fill="white"/>

  <!-- TIER LABEL -->
  <line x1="16" y1="248" x2="65" y2="248" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="252" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900"
        fill="#60a5fa" text-anchor="middle" letter-spacing="3">MEDIUM</text>
  <line x1="155" y1="248" x2="204" y2="248" stroke="#60a5fa" stroke-width="2"/>

  <text x="110" y="268" font-family="Arial, sans-serif" font-size="9" font-weight="700"
        fill="#ffffff" text-anchor="middle">Great job!</text>
  <text x="110" y="282" font-family="Arial, sans-serif" font-size="7.5" fill="#aaaaaa" text-anchor="middle">Building strong security knowledge</text>
</svg>
