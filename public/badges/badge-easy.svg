<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Easy badge">
  <defs>
    <linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#082008"/>
      <stop offset="100%" stop-color="#14501a"/>
    </linearGradient>
    <filter id="eglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#22aa30" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield background -->
  <path d="M18 10 L102 10 Q110 10 110 18 C110 60 88 88 60 102 C32 88 10 60 10 18 Q10 10 18 10 Z"
        fill="url(#eg)" filter="url(#eglow)"/>

  <!-- Shield outline -->
  <path d="M18 10 L102 10 Q110 10 110 18 C110 60 88 88 60 102 C32 88 10 60 10 18 Q10 10 18 10 Z"
        fill="none" stroke="#3ddf50" stroke-width="3"/>

  <!-- Banner ribbon -->
  <rect x="18" y="22" width="84" height="20" fill="#edf5ee"/>
  <rect x="18" y="22" width="84" height="2" fill="#3ddf50"/>
  <rect x="18" y="40" width="84" height="2" fill="#3ddf50"/>
  <text x="60" y="35" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, Arial, sans-serif" font-size="8" font-weight="800"
        fill="#0a2a0c" letter-spacing="1">CROSSED</text>

  <!-- Puzzle piece icon (easy) -->
  <g stroke="#3ddf50" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M44 52 L52 52 A4 4 0 0 1 68 52 L76 52 L76 60 A4 4 0 0 0 76 76 L76 84 L68 84 A4 4 0 0 1 52 84 L44 84 L44 76 A4 4 0 0 0 44 60 Z"/>
  </g>
  <path d="M44 52 L52 52 A4 4 0 0 1 68 52 L76 52 L76 60 A4 4 0 0 0 76 76 L76 84 L68 84 A4 4 0 0 1 52 84 L44 84 L44 76 A4 4 0 0 0 44 60 Z"
        fill="#3ddf50" opacity="0.14"/>

  <!-- 1 star -->
  <g fill="#ffffff">
    <polygon points="60,90 61.9,95.8 68,95.8 63,99.2 64.9,105 60,101.6 55.1,105 57,99.2 52,95.8 58.1,95.8" transform="scale(0.7) translate(26,42)"/>
  </g>

  <!-- Tier label -->
  <text x="60" y="113" text-anchor="middle"
        font-family="system-ui, Arial, sans-serif" font-size="9" font-weight="900"
        fill="#3ddf50" letter-spacing="1.5">EASY</text>
</svg>
