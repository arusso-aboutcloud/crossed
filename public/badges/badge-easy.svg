<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" role="img" aria-label="Easy badge">
  <defs>
    <linearGradient id="border-easy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <clipPath id="shield-clip-easy">
      <path d="M100,8 L185,40 L185,120 Q185,185 100,220 Q15,185 15,120 L15,40 Z"/>
    </clipPath>
    <filter id="shadow-easy" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Shield outer border -->
  <path d="M100,8 L185,40 L185,120 Q185,185 100,220 Q15,185 15,120 L15,40 Z"
        fill="url(#border-easy)" filter="url(#shadow-easy)"/>

  <!-- Shield inner dark body -->
  <path d="M100,16 L178,45 L178,120 Q178,178 100,212 Q22,178 22,120 L22,45 Z"
        fill="#0d1117"/>

  <!-- Microsoft 4-color logo -->
  <rect x="80" y="25" width="18" height="18" fill="#f25022" rx="1"/>
  <rect x="101" y="25" width="18" height="18" fill="#7fba00" rx="1"/>
  <rect x="80" y="46" width="18" height="18" fill="#00a4ef" rx="1"/>
  <rect x="101" y="46" width="18" height="18" fill="#ffb900" rx="1"/>

  <!-- Ribbon banner -->
  <polygon points="15,90 185,90 185,118 15,118" fill="#ffffff"/>
  <polygon points="15,90 30,104 15,118" fill="#d1d5db"/>
  <polygon points="185,90 170,104 185,118" fill="#d1d5db"/>
  <text x="100" y="101" font-family="Arial Black, Arial, sans-serif" font-size="8" font-weight="900" fill="#1a1a2e" text-anchor="middle" letter-spacing="1">SUMMER SECURITY</text>
  <text x="100" y="112" font-family="Arial Black, Arial, sans-serif" font-size="8" font-weight="900" fill="#1a1a2e" text-anchor="middle" letter-spacing="1">CROSSWORD</text>

  <!-- Puzzle piece icon (Easy) -->
  <path d="M85,138 L95,138 Q95,130 100,130 Q105,130 105,138 L115,138 L115,148 Q123,148 123,153 Q123,158 115,158 L115,168 L85,168 L85,158 Q77,158 77,153 Q77,148 85,148 Z" fill="none" stroke="#22c55e" stroke-width="2.5"/>

  <!-- Star rating pill: 1 star -->
  <rect x="65" y="190" width="70" height="20" rx="10" fill="#0d1117" stroke="#22c55e" stroke-width="1.5"/>
  <!-- 1 star at cx=100, cy=200, r=7 -->
  <path d="M100,193 L102.45,199.16 L109.65,199.16 L104.06,203.24 L106.06,209.5 L100,205.5 L93.94,209.5 L95.94,203.24 L90.35,199.16 L97.55,199.16 Z" fill="white"/>

  <!-- Tier label with horizontal lines -->
  <line x1="15" y1="230" x2="75" y2="230" stroke="#22c55e" stroke-width="1.5"/>
  <text x="100" y="234" font-family="Arial Black, Arial, sans-serif" font-size="11" font-weight="900" fill="#22c55e" text-anchor="middle" letter-spacing="2">EASY</text>
  <line x1="125" y1="230" x2="185" y2="230" stroke="#22c55e" stroke-width="1.5"/>
</svg>
